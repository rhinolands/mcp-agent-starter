<svg viewBox="0 0 720 460" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica Neue, Arial, sans-serif" role="img" aria-label="MCP agent starter security model: an agent tool call hits a default-deny policy gate (policy.require capability); allowed reads run directly, allowed writes go through a two-step human-confirm gate (propose_write stages a token, confirm_write applies it), denials fail closed, and every call — allow or deny — is appended to audit.log as JSON.">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#5A5142" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrowR" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#A8362B" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="720" height="460" fill="#F4EFE3"/>
  <text x="24" y="32" font-size="21" font-weight="700" fill="#1B1916">MCP Agent Starter &#183; Security Model</text>
  <text x="24" y="52" font-size="12.5" fill="#6B6151">default-deny authz &#183; human-confirm on writes &#183; audit every call</text>

  <rect x="26" y="150" width="120" height="64" rx="8" fill="#E7DCC6" stroke="#D6C9AA"/>
  <text x="86" y="180" text-anchor="middle" font-size="15" font-weight="600" fill="#1B1916">AI Agent</text>
  <text x="86" y="198" text-anchor="middle" font-size="11.5" fill="#6B6151">tool call</text>
  <line x1="146" y1="182" x2="232" y2="182" stroke="#5A5142" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="234" y="116" width="194" height="132" rx="10" fill="#1B1916"/>
  <text x="331" y="142" text-anchor="middle" font-size="15" font-weight="700" fill="#F4EFE3">POLICY GATE</text>
  <text x="331" y="160" text-anchor="middle" font-size="11" fill="#C9BCA0">policy.require(capability)</text>
  <line x1="252" y1="172" x2="410" y2="172" stroke="#4A443B" stroke-width="1"/>
  <text x="252" y="193" font-size="12" fill="#EDE6D8">&#8226; default-deny</text>
  <text x="252" y="213" font-size="12" fill="#EDE6D8">&#8226; allow &#8594; run tool</text>
  <text x="252" y="233" font-size="12" fill="#F2B2A8" font-weight="600">&#8226; deny &#8594; fail closed</text>

  <rect x="470" y="92" width="216" height="56" rx="8" fill="#E7DCC6" stroke="#D6C9AA"/>
  <text x="578" y="116" text-anchor="middle" font-size="14" font-weight="600" fill="#1B1916">Read tools</text>
  <text x="578" y="134" text-anchor="middle" font-size="11.5" fill="#6B6151">kb.read &#183; status.read</text>
  <path d="M428,150 L470,124" fill="none" stroke="#5A5142" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="432" y="86" font-size="10.5" font-weight="700" fill="#A8362B">allow &#183; read</text>

  <text x="578" y="172" text-anchor="middle" font-size="10.5" font-weight="700" fill="#A8362B">human-confirm &#183; two-step</text>
  <rect x="470" y="180" width="106" height="58" rx="8" fill="#E7DCC6" stroke="#D6C9AA"/>
  <text x="523" y="205" text-anchor="middle" font-size="13" font-weight="600" fill="#1B1916">propose_write</text>
  <text x="523" y="223" text-anchor="middle" font-size="11" fill="#6B6151">stage &#8594; token</text>
  <rect x="596" y="180" width="104" height="58" rx="8" fill="#E7DCC6" stroke="#D6C9AA"/>
  <text x="648" y="205" text-anchor="middle" font-size="13" font-weight="600" fill="#1B1916">confirm_write</text>
  <text x="648" y="223" text-anchor="middle" font-size="11" fill="#6B6151">apply change</text>
  <path d="M428,214 L470,209" fill="none" stroke="#5A5142" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="430" y="248" font-size="10.5" font-weight="700" fill="#A8362B">allow &#183; write</text>
  <line x1="576" y1="209" x2="596" y2="209" stroke="#A8362B" stroke-width="1.5" marker-end="url(#arrowR)"/>

  <path d="M331,248 L331,300" fill="none" stroke="#5A5142" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="234" y="302" width="330" height="54" rx="8" fill="#EFE7D5" stroke="#1B1916" stroke-width="1.3"/>
  <text x="399" y="326" text-anchor="middle" font-size="14" font-weight="700" fill="#1B1916">audit.log</text>
  <text x="399" y="344" text-anchor="middle" font-size="11.5" fill="#6B6151">every call &#8212; allow + deny &#8212; JSON</text>
  <text x="340" y="288" font-size="10.5" font-weight="700" fill="#A8362B">log allow + deny</text>
  <path d="M648,238 C648,280 600,294 566,318" fill="none" stroke="#5A5142" stroke-width="1.2" stroke-dasharray="4 4" marker-end="url(#arrow)"/>

  <line x1="40" y1="398" x2="680" y2="398" stroke="#DDD2BC" stroke-width="1"/>
  <text x="360" y="420" text-anchor="middle" font-size="12" font-weight="600" fill="#A8362B">Add a tool, declare its capability &#8212; you can&#8217;t ship an ungoverned tool.</text>
</svg>
